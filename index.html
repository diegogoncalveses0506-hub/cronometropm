<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Missão PM</title>

<style>
@font-face {
    font-family: 'Digital7';
    src: url('digital-7.ttf');
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

body {
    background: url('fundo.png') no-repeat center center;
    background-size: 100% 100%;
}

/* CAIXA DO CRONÔMETRO (não mexi) */
.container {
    position: absolute;
    top: 64%;
    left: 51%;
    transform: translate(-50%, -50%);

    background: rgba(0, 0, 0, 0.95);
    padding: 20px;
    border-radius: 15px;
    border: 4px solid #FFD700;
    text-align: center;
}

.timer {
    font-size: 90px;
    color: #FFD700;
    margin: 15px 0;
    font-family: 'Digital7';
    letter-spacing: 3px;
}

.inputs input {
    width: 160px;
    padding: 2px;
    margin: 6px;
    font-size: 20px;
    text-align: center;
    border-radius: 6px;
    border: none;
}

button {
    padding: 16px 32px;
    margin: 10px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.start { background: #00c853; color: white; }
.pause { background: #ffab00; }
.reset { background: #d50000; color: white; }

/* 🔊 CONTROLES DE RUÍDO FORA DA CAIXA */
.noise-box {
    position: absolute;

    /* 👉 AJUSTE AQUI A POSIÇÃO */
    top: 5%;
    left: 4%;
    transform: translate(-50%, -50%);

    text-align: center;
}

/* botão pequeno */
.noise-btn {
    padding: 6px 12px;
    font-size: 12px;
    background: #555;
    color: white;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

/* barra de volume */
.volume {
    width: 120px;
    margin-top: 5px;
}
</style>
</head>

<body>

<!-- 🔥 CRONÔMETRO (fica isolado) -->
<div class="container">

    <div class="inputs">
        <input type="number" id="hora" placeholder="H">
        <input type="number" id="min" placeholder="M">
        <input type="number" id="sec" placeholder="S">
    </div>

    <div class="timer" id="timer">00:00:00</div>

    <button class="start" onclick="start()">INICIAR</button>
    <button class="pause" onclick="pause()">PAUSAR</button>
    <button class="reset" onclick="reset()">RESETAR</button>

</div>

<!-- 🔊 RUÍDO FORA DA CAIXA -->
<div class="noise-box">

    <button class="noise-btn" onclick="toggleNoise()">🔊 RUÍDO</button>
    <br>

    <input class="volume" type="range" min="0" max="1" step="0.01" value="0.5" onchange="setVolume(this.value)">

</div>

<!-- ÁUDIO -->
<audio id="noise" loop>
    <source src="ruido.mp3" type="audio/mpeg">
</audio>

<script>
let time = 0;
let interval = null;
let noisePlaying = false;

/* 🔊 RUÍDO */
function toggleNoise() {
    let audio = document.getElementById("noise");

    if (!noisePlaying) {
        audio.play();
        noisePlaying = true;
    } else {
        audio.pause();
        noisePlaying = false;
    }
}

function setVolume(v) {
    document.getElementById("noise").volume = v;
}

/* ⏱️ TIMER */
function updateDisplay() {
    let h = Math.floor(time / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = time % 60;

    document.getElementById("timer").innerHTML =
        String(h).padStart(2, '0') + ":" +
        String(m).padStart(2, '0') + ":" +
        String(s).padStart(2, '0');
}

function start() {
    if (!interval) {

        if (time === 0) {
            let h = parseInt(document.getElementById("hora").value) || 0;
            let m = parseInt(document.getElementById("min").value) || 0;
            let s = parseInt(document.getElementById("sec").value) || 0;

            time = (h * 3600) + (m * 60) + s;
        }

        interval = setInterval(() => {
            if (time > 0) {
                time--;
                updateDisplay();
            } else {
                clearInterval(interval);
                interval = null;
                alert("MISSÃO CONCLUÍDA 💀🔥");
            }
        }, 1000);
    }
}

function pause() {
    clearInterval(interval);
    interval = null;
}

function reset() {
    pause();
    time = 0;
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
